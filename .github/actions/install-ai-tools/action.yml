name: Install AI Tools
description: >
  Install system dependencies, Goose, Claude Code CLI, and the gh-agentic
  extension with caching support.

inputs:
  goose-version:
    description: 'Goose version to install (default: latest)'
    required: false
    default: 'latest'
  claude-cli-version:
    description: 'Claude Code CLI version to install (default: latest)'
    required: false
    default: 'latest'
  agentic-version:
    description: 'gh-agentic extension version to install (e.g. v1.2.3). Must match AGENTIC_FRAMEWORK_VERSION. When empty, the extension install is skipped — use this for workflows (e.g. release notes) that do not need the framework mounted.'
    required: false
    default: ''
  gh-token:
    description: 'GitHub token used to install the gh-agentic extension. Required when agentic-version is set.'
    required: false
    default: ''
  agent-provider:
    description: 'Agent provider to use for the agent (e.g. claude-code, mistral).'
    required: false
    default: 'claude-code'

runs:
  using: composite
  steps:
    # System deps are inlined (previously the install-system-deps composite).
    # GitHub Actions resolves `uses: ./path` inside a composite relative to
    # the caller's workspace root, not the composite's own directory, which
    # breaks when this action is consumed via nested checkout from another
    # repo. Inlining eliminates the inter-composite dependency.
    - name: Check if system packages already installed
      id: sys-check
      shell: bash
      run: |
        dpkg -s gh bzip2 libgomp1 libvulkan1 >/dev/null 2>&1 \
          && echo "installed=true" >> $GITHUB_OUTPUT \
          || echo "installed=false" >> $GITHUB_OUTPUT

    - name: Resolve package versions for cache key
      id: sys-pkg-versions
      if: steps.sys-check.outputs.installed != 'true'
      shell: bash
      run: |
        # Use apt-cache show without updating lists — fast, works on stale lists
        GH_VER=$(apt-cache show gh 2>/dev/null | grep '^Version:' | head -1 | awk '{print $2}' || echo "latest")
        BZIP2_VER=$(apt-cache show bzip2 2>/dev/null | grep '^Version:' | head -1 | awk '{print $2}' || echo "latest")
        LIBGOMP_VER=$(apt-cache show libgomp1 2>/dev/null | grep '^Version:' | head -1 | awk '{print $2}' || echo "latest")
        LIBVULKAN_VER=$(apt-cache show libvulkan1 2>/dev/null | grep '^Version:' | head -1 | awk '{print $2}' || echo "latest")
        echo "key=apt-sys-deps-${{ runner.os }}-${{ runner.arch }}-gh${GH_VER}-bzip2${BZIP2_VER}-gomp${LIBGOMP_VER}-vulkan${LIBVULKAN_VER}" >> $GITHUB_OUTPUT

    - name: Cache apt archives
      if: steps.sys-check.outputs.installed != 'true'
      id: sys-cache-apt
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: /var/cache/apt/archives
        key: ${{ steps.sys-pkg-versions.outputs.key }}

    - name: Install system packages
      if: steps.sys-check.outputs.installed != 'true'
      shell: bash
      run: |
        sudo rm -rf /var/lib/apt/lists/*
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends --fix-missing gh bzip2 libgomp1 libvulkan1

    - name: Resolve Goose version
      id: goose-version
      shell: bash
      env:
        INPUT_GOOSE_VERSION: ${{ inputs.goose-version }}
        GH_TOKEN: ${{ inputs.gh-token }}
      run: |
        if [ "${INPUT_GOOSE_VERSION}" = "latest" ]; then
          # Use gh api (authenticated via GH_TOKEN) to avoid the 60 req/hour
          # unauthenticated rate limit that causes 403s on shared runner IPs.
          GOOSE_VERSION=$(gh api repos/block/goose/releases/latest --jq '.tag_name' | sed 's/^v//')
        else
          GOOSE_VERSION="${INPUT_GOOSE_VERSION}"
        fi
        echo "version=${GOOSE_VERSION}" >> $GITHUB_OUTPUT

    - name: Cache Goose binary
      id: cache-goose
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ~/.local/bin/goose
        key: goose-${{ steps.goose-version.outputs.version }}

    - name: Install Goose
      if: steps.cache-goose.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        GOOSE_VERSION="${{ steps.goose-version.outputs.version }}"
        curl --proto '=https' --tlsv1.2 -fsSL "https://github.com/block/goose/releases/download/v${GOOSE_VERSION}/goose-x86_64-unknown-linux-gnu.tar.bz2" -o /tmp/goose.tar.bz2
        tar -xj -C ~/.local/bin -f /tmp/goose.tar.bz2

    - name: Resolve Claude CLI version
      if: inputs.agent-provider == 'claude-code'
      id: claude-version
      shell: bash
      env:
        INPUT_CLAUDE_VERSION: ${{ inputs.claude-cli-version }}
      run: |
        if [ "${INPUT_CLAUDE_VERSION}" = "latest" ]; then
          CLAUDE_VERSION=$(npm view @anthropic-ai/claude-code version 2>/dev/null || echo "unknown")
        else
          CLAUDE_VERSION="${INPUT_CLAUDE_VERSION}"
        fi
        echo "version=${CLAUDE_VERSION}" >> $GITHUB_OUTPUT

    - name: Cache Claude Code CLI
      id: cache-claude
      if: inputs.agent-provider == 'claude-code'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ${{ runner.tool_cache }}/claude-cli
        key: claude-cli-${{ steps.claude-version.outputs.version }}

    - name: Install Claude Code CLI
      if: steps.cache-claude.outputs.cache-hit != 'true'
      shell: bash
      env:
        INPUT_CLAUDE_VERSION: ${{ inputs.claude-cli-version }}
        TOOL_CACHE: ${{ runner.tool_cache }}
      run: |
        npm config set prefix "${TOOL_CACHE}/claude-cli"
        if [ "${INPUT_CLAUDE_VERSION}" = "latest" ]; then
          npm install -g @anthropic-ai/claude-code
        else
          npm install -g "@anthropic-ai/claude-code@${INPUT_CLAUDE_VERSION}"
        fi

    - name: Restore Claude CLI from cache
      if: steps.cache-claude.outputs.cache-hit == 'true'
      shell: bash
      run: |
        npm config set prefix "${{ runner.tool_cache }}/claude-cli"

    - name: Add tools to PATH
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        echo "${{ runner.tool_cache }}/claude-cli/bin" >> $GITHUB_PATH

    - name: Install gh-agentic extension
      if: inputs.agentic-version != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh-token }}
        AGENTIC_VERSION: ${{ inputs.agentic-version }}
      run: |
        if [ -z "${GH_TOKEN}" ]; then
          echo "::error::gh-token input is required when agentic-version is set."
          exit 1
        fi
        echo "Installing gh-agentic extension pinned to ${AGENTIC_VERSION}..."
        gh extension install eddiecarpenter/gh-agentic --pin "${AGENTIC_VERSION}" --force
        gh agentic --version || true
