name: Release Notes

# Generates AI release notes from git history and updates the release body.
# Fires when a GitHub release is published — either in the gh-agentic
# framework repo itself (direct trigger) or in a domain repo via a thin
# wrapper that calls this workflow with `uses:`.
#
# Release CREATION is not handled here — that is each project's own
# concern (GoReleaser, npm publish, cargo publish, etc.). This workflow
# only augments the release body after it already exists.
#
# Mounts the framework at .ai/ the same way the pipeline workflow does:
# nested-checkout of gh-agentic into .agentic-tools/ (so composite actions
# resolve) and direct git clone into .ai/ (no dependency on the gh-agentic
# extension being callable). On the framework repo itself, .ai is a
# committed symlink to . — the CI workspace step replaces it with a real
# clone for the duration of the job.

on:
  release:
    types: [published]
  workflow_call:
    secrets:
      GOOSE_AGENT_PAT:
        required: true
      CLAUDE_CREDENTIALS_JSON:
        required: true

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout domain repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # full history required to find previous tag and commits
          token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Resolve framework version
        id: version
        env:
          AGENTIC_FRAMEWORK_VERSION: ${{ vars.AGENTIC_FRAMEWORK_VERSION }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Domain repos pin via AGENTIC_FRAMEWORK_VERSION. The framework
          # repo triggering on its own release: published has no such
          # variable — the release tag that just fired IS the version.
          if [ -n "${AGENTIC_FRAMEWORK_VERSION}" ]; then
            VERSION=$(echo "${AGENTIC_FRAMEWORK_VERSION}" | tr -d '[:space:]')
          elif [ -n "${RELEASE_TAG}" ]; then
            VERSION="${RELEASE_TAG}"
          else
            echo "::error::Neither AGENTIC_FRAMEWORK_VERSION nor release tag is set — cannot resolve framework version."
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout gh-agentic tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: eddiecarpenter/gh-agentic
          ref: ${{ steps.version.outputs.version }}
          path: .agentic-tools
          token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 'lts/*'

      - name: Install tools
        uses: ./.agentic-tools/.github/actions/install-ai-tools
        with:
          gh-token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Mount AI framework
        env:
          FRAMEWORK_VERSION: ${{ steps.version.outputs.version }}
          FRAMEWORK_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          echo "Mounting framework ${FRAMEWORK_VERSION} into .ai/ via git clone..."
          rm -rf .ai
          git clone --depth 1 --branch "${FRAMEWORK_VERSION}" \
            "https://x-access-token:${FRAMEWORK_TOKEN}@github.com/eddiecarpenter/gh-agentic.git" \
            .ai
          if ! grep -qxF '.ai/' .gitignore 2>/dev/null; then
            echo '.ai/' >> .gitignore
          fi
          echo "✓ Framework mounted at .ai/ (ref: $(git -C .ai describe --tags --exact-match 2>/dev/null || echo 'unknown'))"

      - name: Setup Claude Code auth
        uses: ./.agentic-tools/.github/actions/setup-claude-auth
        with:
          claude-credentials-json: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
          gh-token: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Configure environment
        run: |
          git config user.name "${{ vars.AGENT_USER || 'github-actions[bot]' }}"
          git config user.email "${{ vars.AGENT_USER || 'github-actions[bot]' }}@users.noreply.github.com"

      - name: Configure Goose
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml <<GOOSEEOF
          GOOSE_PROVIDER: ${{ vars.GOOSE_PROVIDER || 'claude-code' }}
          GOOSE_MODEL: ${{ vars.GOOSE_MODEL || 'default' }}
          GOOSEEOF

      - name: Run release recipe
        run: |
          goose run \
            --recipe .ai/.goose/recipes/release.yaml \
            --params tag=${{ github.event.release.tag_name }} \
            --params repo=${{ github.repository }}
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.ai/.goose
          GOOSE_PROVIDER: ${{ vars.GOOSE_PROVIDER || 'claude-code' }}
          GOOSE_MODEL: ${{ vars.GOOSE_MODEL || 'default' }}
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}

      - name: Verify release notes were updated
        env:
          GOOSE_AGENT_PAT: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          BODY=$(curl --proto '=https' --tlsv1.2 -sf \
            -H "Authorization: token ${GOOSE_AGENT_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }}" \
            | jq -r '.body')
          if echo "$BODY" | grep -q "Generating release notes"; then
            echo "ERROR: Release body was not updated — Goose session produced no output."
            echo "Check that CLAUDE_CREDENTIALS_JSON is set in this repo's secrets and is valid."
            exit 1
          fi
          echo "Release notes updated successfully."
