name: Release Notes

# Generates AI release notes from git history and updates the release body.
# Fires when a GitHub release is published — either in the gh-agentic
# framework repo itself (direct trigger) or in a domain repo via a thin
# wrapper that calls this workflow with `uses:`.
#
# Release CREATION is not handled here — that is each project's own
# concern (GoReleaser, npm publish, cargo publish, etc.). This workflow
# only augments the release body after it already exists.
#
# Authentication uses the built-in `github.token` provided by GitHub Actions.
# The framework is mounted via the `.agents/` git submodule in the parent
# repo — no bespoke `Mount AI framework` step.

on:
  release:
    types: [published]
  workflow_call:
    secrets:
      # Provider-specific secrets are both optional at the workflow_call
      # level — setup-agent-auth enforces that the active provider's
      # secret (per vars.AGENT_PROVIDER) is non-empty at runtime. A
      # project using Claude needs CLAUDE_CREDENTIALS_JSON; a project
      # using Mistral needs MISTRAL_API_KEY; making both required here
      # would force Mistral-only projects to set a stale Claude secret.
      CLAUDE_CREDENTIALS_JSON:
        required: false
      MISTRAL_API_KEY:
        required: false

jobs:
  release-notes:
    name: Generate Release Notes
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}
    permissions:
      contents: write

    steps:
      - name: Checkout domain repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0  # full history required to find previous tag and commits
          submodules: recursive
          token: ${{ github.token }}

      - name: Resolve framework version
        id: version
        env:
          AGENTIC_FRAMEWORK_VERSION: ${{ vars.AGENTIC_FRAMEWORK_VERSION }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          # Domain repos pin via AGENTIC_FRAMEWORK_VERSION. The framework
          # repo triggering on its own release: published has no such
          # variable — the release tag that just fired IS the version.
          if [ -n "${AGENTIC_FRAMEWORK_VERSION}" ]; then
            VERSION=$(echo "${AGENTIC_FRAMEWORK_VERSION}" | tr -d '[:space:]')
          elif [ -n "${RELEASE_TAG}" ]; then
            VERSION="${RELEASE_TAG}"
          else
            echo "::error::Neither AGENTIC_FRAMEWORK_VERSION nor release tag is set — cannot resolve framework version."
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: 'lts/*'

      - name: Install tools
        uses: ./.agents/.github/actions/install-ai-tools
        with:
          gh-token: ${{ github.token }}

      - name: Setup Agent Auth
        uses: ./.agents/.github/actions/setup-agent-auth
        with:
          agent-provider: ${{ vars.AGENT_PROVIDER || 'claude-code' }}
          claude-credentials-json: ${{ secrets.CLAUDE_CREDENTIALS_JSON }}
          mistral-api-key: ${{ secrets.MISTRAL_API_KEY }}
          gh-token: ${{ github.token }}

      - name: Configure Goose
        run: |
          mkdir -p ~/.config/goose
          cat > ~/.config/goose/config.yaml <<GOOSEEOF
          GOOSE_PROVIDER: ${{ vars.AGENT_PROVIDER || 'claude-code' }}
          GOOSE_MODEL: ${{ vars.AGENT_MODEL || 'default' }}
          GOOSEEOF

      - name: Run release recipe
        run: |
          goose run \
            --recipe .agents/.goose/recipes/release-notes.yaml \
            --params tag=${{ github.event.release.tag_name }}
        env:
          GOOSE_PATH_ROOT: ${{ github.workspace }}/.agents/.goose
          GOOSE_PROVIDER: ${{ vars.AGENT_PROVIDER || 'claude-code' }}
          GOOSE_MODEL: ${{ vars.AGENT_MODEL || 'default' }}
          GOOSE_MODE: auto
          GOOSE_DISABLE_SESSION_NAMING: "true"
          GH_TOKEN: ${{ github.token }}

      - name: Verify release notes were updated
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(curl --proto '=https' --tlsv1.2 -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }}" \
            | jq -r '.body')
          if echo "$BODY" | grep -q "Generating release notes"; then
            echo "ERROR: Release body was not updated — Goose session produced no output."
            echo "Check that CLAUDE_CREDENTIALS_JSON is set in this repo's secrets and is valid."
            exit 1
          fi
          echo "Release notes updated successfully."
