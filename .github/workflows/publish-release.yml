name: Publish Release

on:
  push:
    tags:
      - 'v*'

# Release chain:
#
#   tag push (v*)
#     ↓
#   This workflow — GoReleaser builds platform binaries and creates the GitHub release
#     ↓
#   on: release: types: [published]  (release.yml)
#     ↓
#   Framework release.yml — Goose generates AI release notes, updates the release body

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ vars.AGENTIC_APP_ID }}
          private-key: ${{ secrets.AGENTIC_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          # Must use the App installation token (not GITHUB_TOKEN) so the
          # published release event propagates to release.yml for AI note
          # generation. Workflows triggered by GITHUB_TOKEN cannot trigger
          # other workflows; tokens minted by GitHub Apps can.
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
