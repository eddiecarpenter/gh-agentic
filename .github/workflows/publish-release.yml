name: Publish Release

on:
  push:
    tags:
      - 'v*'

# Release chain:
#
#   tag push (v*)
#     ↓
#   This workflow — GoReleaser builds platform binaries and creates the GitHub release
#     ↓
#   on: release: types: [published]  (release.yml)
#     ↓
#   Framework release.yml — Goose generates AI release notes, updates the release body

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # gh-agentic is its own framework source — the pipeline pins to
      # AGENTIC_FRAMEWORK_VERSION, so a release that does not also bump
      # the variable leaves CI running against the previous version. This
      # step closes that loop. It is local to this repo (documented in
      # LOCALRULES.md "Release Version Sync") and does not belong in any
      # framework-shared workflow.
      - name: Bump AGENTIC_FRAMEWORK_VERSION to released tag
        env:
          # Must use PIPELINE_PAT (not github.token) — fine-grained PAT with
          # Variables: write is required to update repo variables. The built-in
          # github.token does not have permission to write Actions variables on
          # personal repos regardless of the workflow's `permissions` block.
          GH_TOKEN: ${{ secrets.PIPELINE_PAT }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh variable set AGENTIC_FRAMEWORK_VERSION \
            --repo "${{ github.repository }}" \
            --body "${RELEASE_TAG}"
          echo "AGENTIC_FRAMEWORK_VERSION pinned to ${RELEASE_TAG}"
