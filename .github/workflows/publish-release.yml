name: Publish Release

on:
  push:
    tags:
      - 'v*'

# Release chain:
#
#   tag push (v*)
#     ↓
#   This workflow — GoReleaser builds platform binaries and creates the GitHub release
#     ↓
#   on: release: types: [published]  (release.yml)
#     ↓
#   Framework release.yml — Goose generates AI release notes, updates the release body

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          # Must use GOOSE_AGENT_PAT (not GITHUB_TOKEN) so that the published
          # release event propagates to release.yml for AI note generation.
          # Workflows triggered by GITHUB_TOKEN cannot trigger other workflows.
          GITHUB_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
