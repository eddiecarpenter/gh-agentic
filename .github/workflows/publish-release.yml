name: Publish Release

on:
  push:
    tags:
      - 'v*'

# Release chain:
#
#   tag push (v*)
#     ↓
#   This workflow — GoReleaser builds platform binaries and creates the GitHub release
#     ↓
#   on: release: types: [published]  (release.yml)
#     ↓
#   Framework release.yml — Goose generates AI release notes, updates the release body

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
