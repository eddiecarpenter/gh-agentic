version: "1.0.0"
title: "Issue Session"
description: "As the issue-session agent, I want to handle an assigned-to-agent issue — answering questions, implementing small fixes, or redirecting out-of-scope items to the pipeline — so that simple work is dispatched without forcing it through the full Requirement → Feature flow."

parameters:
  - key: issue_number
    input_type: number
    requirement: required
    default: ""
    description: "The non-pipeline issue number to handle."

  - key: repo
    input_type: string
    requirement: required
    default: ""
    description: "The active repo in owner/name form."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 100

instructions: |
  Load `AGENTS.md` (the project rulebook). Then execute the
  `issue-session` skill for issue {{ issue_number }} in
  {{ repo }}. The skill is the authoritative playbook; do not
  improvise.
