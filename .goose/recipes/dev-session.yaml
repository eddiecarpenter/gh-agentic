version: "1.0.0"
title: "Dev Session"
description: "As the dev-session agent, I want to walk a Feature's open Task sub-issues in order, implementing each with tests and committing per the commit-discipline, so that the Feature lands as a PR with all its acceptance criteria covered."

parameters:
  - key: feature_number
    input_type: number
    requirement: required
    default: ""
    description: "The Feature issue to implement."

  - key: repo
    input_type: string
    requirement: required
    default: ""
    description: "The active repo in owner/name form."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 200

instructions: |
  Load `AGENTS.md` (the project rulebook). Then execute the
  `dev-session` skill for Feature {{ feature_number }} in
  {{ repo }}. The skill is the authoritative playbook; do not
  improvise.
