version: "1.0.0"
title: "Compliance Verify"
description: "As the compliance-verify agent, I want to evaluate the feature branch implementation against every acceptance criterion in the Feature issue, so that the pipeline only opens a PR when the work genuinely satisfies the stated requirements."

parameters:
  - key: feature_number
    input_type: number
    requirement: required
    default: ""
    description: "The Feature issue to verify."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 80

instructions: |
  You are an automated agent in this project's agentic delivery pipeline.

prompt: |
  Load `AGENTS.md` (the project rulebook). Then execute the
  `compliance-verify` skill for Feature {{ feature_number }}. The
  skill is the authoritative playbook; do not improvise.
