version: "1.0.0"
title: "PR Review Session"
description: "As the pr-review-session agent, I want to address every unaddressed reviewer comment on a PR — answering questions inline and implementing change-requests as a single batched commit — so that the reviewer sees prompt, evidence-bound responses to their feedback."

parameters:
  - key: pr_number
    input_type: number
    requirement: required
    default: ""
    description: "The pull request number to process."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 600
    bundled: true

settings:
  max_turns: 100

instructions: |
  You are an automated agent in this project's agentic delivery pipeline.

prompt: |
  Load `AGENTS.md` (the project rulebook) from the control-plane
  knowledge root — the directory named by the `AGENTIC_CP_ROOT`
  environment variable, or the current directory when it is unset.
  Then execute the
  `pr-review-session` skill for PR {{ pr_number }}. The skill is
  the authoritative playbook; do not improvise.
