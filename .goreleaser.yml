version: 2

project_name: gh-agentic

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/gh-agentic
    binary: gh-agentic
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "gh-agentic_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^refactor:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: eddiecarpenter
    name: gh-agentic
  draft: false
  prerelease: auto
